<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seleção de Mesa - Restaurante</title>
    <!-- Fontes Premium -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #d4af37; /* Dourado */
            --success: #10b981;
            --occupied: #ef4444;
            --font-main: 'Inter', sans-serif;
            --font-title: 'Playfair Display', serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-main);
            background: linear-gradient(rgba(0, 0, 0, 0.75), rgba(0, 0, 0, 0.85)), 
                        url('https://s3-sa-east-1.amazonaws.com/deliveryon-uploads/products/xalegrill/20_66c652d11e632.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Header */
        header {
            text-align: center;
            padding: 60px 20px 40px;
            max-width: 800px;
        }

        h1 {
            font-family: var(--font-title);
            font-size: 2.5rem;
            color: var(--text-primary);
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        p.subtitle {
            color: var(--text-secondary);
            font-size: 1rem;
            font-weight: 300;
        }

        /* Filtros */
        .filters {
            display: flex;
            gap: 12px;
            margin-bottom: 40px;
            background: rgba(15, 23, 42, 0.6);
            padding: 6px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            border: 1px solid var(--card-border);
        }

        .filter-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            padding: 10px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-family: var(--font-main);
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .filter-btn:hover {
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.05);
        }

        .filter-btn.active {
            background: var(--text-primary);
            color: var(--bg-dark);
            font-weight: 600;
        }

        /* Grid de Mesas */
        .tables-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
            width: 100%;
            max-width: 1200px;
            padding: 0 20px 60px;
        }

        .table-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 24px;
            backdrop-filter: blur(12px);
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
        }

        .table-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            border-color: rgba(255, 255, 255, 0.2);
        }

        /* Indicador de Status */
        .status-badge {
            position: absolute;
            top: 16px;
            right: 16px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 4px 10px;
            border-radius: 20px;
            background: rgba(0, 0, 0, 0.3);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .status-available .status-dot { background-color: var(--success); box-shadow: 0 0 8px var(--success); }
        .status-available { color: var(--success); }

        .status-occupied .status-dot { background-color: var(--occupied); box-shadow: 0 0 8px var(--occupied); }
        .status-occupied { color: var(--occupied); }

        /* Conteúdo do Card */
        .table-icon {
            font-size: 2rem;
            margin-bottom: 16px;
            opacity: 0.8;
            color: var(--text-secondary);
        }

        .table-number {
            font-family: var(--font-title);
            font-size: 1.5rem;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .table-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 20px;
        }

        .qr-placeholder {
            width: 100px;
            height: 100px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 8px;
            padding: 8px;
            margin-top: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s ease;
        }

        .table-card:hover .qr-placeholder {
            transform: scale(1.05);
        }

        .qr-placeholder img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .scan-hint {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 12px;
            opacity: 0.7;
        }

        /* Responsividade */
        @media (max-width: 600px) {
            h1 { font-size: 2rem; }
            .tables-grid { grid-template-columns: 1fr; }
            .filters { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Escolha sua Mesa</h1>
        <p class="subtitle">Escaneie o QR Code ou selecione a mesa para iniciar seu pedido</p>
    </header>

    <!-- Filtros -->
    <div class="filters">
        <button class="filter-btn active" onclick="filterTables('all')">Todas</button>
        <button class="filter-btn" onclick="filterTables('available')">Disponíveis</button>
        <button class="filter-btn" onclick="filterTables('occupied')">Ocupadas</button>
    </div>

    <!-- Grid de Mesas -->
    <div class="tables-grid" id="tablesGrid">
        <!-- As mesas serão inseridas aqui via JavaScript -->
    </div>

    <script>
        // Configuração das Mesas (Simulando dados do backend)
        const tables = [
            { id: 1, number: 'Mesa 01', status: 'available' },
            { id: 2, number: 'Mesa 02', status: 'occupied' },
            { id: 3, number: 'Mesa 03', status: 'available' },
            { id: 4, number: 'Mesa 04', status: 'available' },
            { id: 5, number: 'Mesa 05', status: 'occupied' },
            { id: 6, number: 'Mesa 06', status: 'available' },
            { id: 7, number: 'Mesa 07', status: 'available' },
            { id: 8, number: 'Mesa 08', status: 'occupied' },
        ];

        const grid = document.getElementById('tablesGrid');
        const buttons = document.querySelectorAll('.filter-btn');

        function renderTables(filter = 'all') {
            grid.innerHTML = '';
            
            const filteredTables = tables.filter(table => {
                if (filter === 'all') return true;
                return table.status === filter;
            });

            if (filteredTables.length === 0) {
                grid.innerHTML = '<p style="color: var(--text-secondary); grid-column: 1/-1; text-align: center;">Nenhuma mesa encontrada neste filtro.</p>';
                return;
            }

            filteredTables.forEach(table => {
                const card = document.createElement('a');
                card.className = 'table-card';
                card.href = `/pedido?mesa=${table.id}`;
                
                const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(window.location.origin + '/pedido?mesa=' + table.id)}&color=0f172a`;
                
                const statusLabel = table.status === 'available' ? 'Disponível' : 'Ocupada';

                card.innerHTML = `
                    <div class="status-badge ${table.status === 'available' ? 'status-available' : 'status-occupied'}">
                        <span class="status-dot"></span>
                        ${statusLabel}
                    </div>
                    
                    <div class="table-icon">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M3 12h18M3 6h18M3 18h18"/>
                        </svg>
                    </div>
                    
                    <h3 class="table-number">${table.number}</h3>
                    <p class="table-label">Restaurante Principal</p>
                    
                    <div class="qr-placeholder">
                        <img src="${qrUrl}" alt="QR Code ${table.number}">
                    </div>
                    <p class="scan-hint">Toque para abrir o cardápio</p>
                `;

                grid.appendChild(card);
            });
        }

        function filterTables(type) {
            buttons.forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderTables(type);
        }

        renderTables();
    </script>
</body>
</html>
